<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pain Audit — Life Builder OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  gtag('config', 'G-XXXXXXXXXX');
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0d0d;
  --bg2:     #141414;
  --bg3:     #1c1c1c;
  --border:  #2a2a2a;
  --accent:  #ff6d3b;
  --accent-hover: #ff7d4f;
  --accent2: #7c3aed; /* Reserved — secondary CTA, used in later screens */
  --text:    #ffffff;
  --text2:   #a0a0a0;
  --text3:   #888888;
  --green:   #22c55e;
  --red:     #ef4444;  /* Reserved — hate tag, error state */
  --blue:    #3b82f6;  /* Reserved — routine tag, info state */
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  background: rgba(13,13,13,.95);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}
.topbar-brand { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; }
.topbar-sep { color: var(--border); font-size: 13px; }
.topbar-product { font-size: 13px; color: var(--text3); }

/* SCREENS */
.screen { display: none; max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
.screen.active { display: block; }

/* TYPOGRAPHY */
.brand-label {
  font-size: 12px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.brand-label::before { content: ''; width: 18px; height: 2px; background: var(--accent); border-radius: 2px; }

h1 { font-size: 30px; font-weight: 900; line-height: 1.15; letter-spacing: -.6px; margin-bottom: 14px; }
h1 .hl { background: linear-gradient(90deg, var(--accent), #ff9a6c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
h2 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.subtitle { font-size: 15px; color: var(--text2); line-height: 1.65; margin-bottom: 24px; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--accent); color: #fff;
  padding: 12px 24px; border-radius: 8px; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: background .15s, transform .15s, box-shadow .15s;
  width: 100%;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(255,109,59,.3); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-ghost {
  background: transparent; border: 1px solid var(--border); color: var(--text2);
  width: auto; padding: 10px 18px; font-size: 14px;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: transparent; box-shadow: none; transform: none; }
.btn-row { display: flex; gap: 10px; margin-top: 24px; }
.btn-row .btn { flex: 1; }

/* CARDS */
.card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

/* PROGRESS BAR */
.progress-wrap { margin-bottom: 28px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: var(--text3); }
.progress-count { font-size: 13px; font-weight: 700; color: var(--accent); }
.progress-track { height: 3px; background: var(--bg3); border-radius: 3px; }
.progress-fill { height: 3px; background: var(--accent); border-radius: 3px; box-shadow: 0 0 8px rgba(255,109,59,.5); /* #ff6d3b */ transition: width .3s ease; }

/* STAT ROW */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 22px 0; }
.stat-block {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 12px; text-align: center; position: relative; overflow: hidden;
}
.stat-block::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.stat-num { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 6px; letter-spacing: -1px; }
.stat-lbl { font-size: 12px; color: var(--text3); line-height: 1.4; }

/* PROMISE BOX */
.promise-box {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; margin: 18px 0; position: relative; overflow: hidden;
}
.promise-box::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: linear-gradient(180deg, var(--accent), var(--accent2));
}
.promise-title { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
.promise-box ul { list-style: none; }
.promise-box li { font-size: 14px; color: var(--text2); padding: 4px 0; display: flex; gap: 8px; align-items: flex-start; }
.promise-box li::before { content: '→'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

/* AUTHOR NOTE */
.author-note {
  border: 1px solid var(--border); border-radius: 8px; padding: 13px 16px;
  font-size: 13px; color: var(--text3); line-height: 1.55; font-style: italic; margin-top: 14px;
}

/* SEARCH */
.search-input {
  width: 100%; padding: 12px 16px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 14px; font-family: inherit;
  margin-bottom: 16px; outline: none; transition: border-color .15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

/* SEARCH RESULTS */
.search-results {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
  max-height: 200px; overflow-y: auto; margin-bottom: 16px; display: none;
}
.search-result-item {
  padding: 10px 16px; font-size: 14px; color: var(--text2);
  cursor: pointer; border-bottom: 1px solid var(--border); transition: background .1s;
}
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(255,109,59,.06); color: var(--text); }

/* CATEGORY CARDS */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.cat-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px 16px; cursor: pointer; transition: border-color .15s, background .15s;
  position: relative; overflow: hidden;
}
.cat-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  transition: background .15s;
}
.cat-card.selected { border-color: var(--accent); background: rgba(255,109,59,.06); }
.cat-card.selected::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.cat-card:hover:not(.selected) { border-color: #444; }
.cat-emoji { font-size: 28px; margin-bottom: 10px; display: block; }
.cat-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.cat-sub { font-size: 13px; color: var(--text2); line-height: 1.4; }

/* LIMIT HINT */
.limit-hint {
  background: #1a150a; border: 1px solid #3a2510; border-radius: 7px;
  padding: 9px 13px; font-size: 13px; color: #e09060; margin-bottom: 14px;
}

/* PAIN ITEMS */
.pain-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.pain-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; background: var(--bg2); transition: border-color .15s, opacity .15s;
}
.pain-item:hover:not(.dimmed) { border-color: #444; }
.pain-item.selected { border-color: var(--accent); background: rgba(255,109,59,.06); }
.pain-item.dimmed { opacity: .35; cursor: not-allowed; }
.checkbox {
  width: 18px; height: 18px; min-width: 18px; border: 2px solid var(--border);
  border-radius: 4px; margin-top: 2px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; transition: all .15s; flex-shrink: 0;
}
.pain-item.selected .checkbox { background: var(--accent); border-color: var(--accent); }
.pain-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.pain-desc { font-size: 13px; color: var(--text2); line-height: 1.4; }

/* ADD OWN */
.add-own-wrap { margin-top: 4px; }
.add-own-btn {
  width: 100%; border: 1px dashed var(--border); border-radius: 8px; padding: 12px 14px;
  font-size: 14px; color: var(--text3); cursor: pointer; text-align: center;
  background: transparent; font-family: inherit; transition: border-color .15s, color .15s;
}
.add-own-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-own-input {
  width: 100%; padding: 12px 16px; background: var(--bg2);
  border: 1px solid var(--accent); border-radius: 8px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none; margin-top: 8px;
  display: none;
}

/* TAGGER */
.tagger-why {
  background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.25);
  border-radius: 8px; padding: 12px 15px; font-size: 14px; color: #c4b5fd;
  line-height: 1.5; margin: 14px 0 20px;
}
.tagger-list { display: flex; flex-direction: column; gap: 10px; }
.tagger-row {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
}
.tagger-pain-name { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.tag-options { display: flex; gap: 8px; }
.tag-btn {
  flex: 1; padding: 9px 10px; border-radius: 6px; border: 1px solid var(--border);
  font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer;
  text-align: center; background: var(--bg3); transition: all .15s; font-family: inherit;
}
.tag-btn.active-routine { border-color: var(--blue); background: rgba(59,130,246,.1); color: #93c5fd; }
.tag-btn.active-hate    { border-color: var(--red);  background: rgba(239,68,68,.1);  color: #fca5a5; }

/* TIME CALCULATOR BLOCK */
.time-calc {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 22px 24px; margin-bottom: 20px; position: relative; overflow: hidden;
}
.time-calc::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.time-calc-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
.time-block { flex: 1; text-align: center; }
.time-block-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
.time-block-num { font-size: 36px; font-weight: 900; letter-spacing: -1px; line-height: 1; }
.time-block-num.before { color: var(--text2); }
.time-block-num.after { color: var(--green); }
.time-arrow { font-size: 24px; color: var(--text3); }
.time-savings { font-size: 15px; color: var(--text2); line-height: 1.5; }
.time-savings strong { color: var(--accent); }

/* RESULTS TABLE */
.results-table { width: 100%; border-collapse: collapse; font-size: 14px; margin: 14px 0; }
.results-table th {
  text-align: left; font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .06em; padding: 8px 10px;
  border-bottom: 1px solid var(--border);
}
.results-table td { padding: 13px 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
.tag-pill {
  display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px;
  border-radius: 8px; min-width: 80px; text-align: center;
}
.tag-pill.routine { background: rgba(59,130,246,.1); color: #93c5fd; border: 1px solid rgba(59,130,246,.2); }
.tag-pill.hate    { background: rgba(239,68,68,.1);  color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
.time-saved-badge {
  display: inline-flex; align-items: center; background: rgba(34,197,94,.1);
  color: var(--green); font-size: 13px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; border: 1px solid rgba(34,197,94,.2);
}
.expand-btn {
  background: none; border: none; color: var(--text3); font-size: 18px;
  cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: color .15s;
}
.expand-btn:hover { color: var(--accent); }

/* EXPAND CARD */
.expand-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px; margin: 4px 0 8px; position: relative; overflow: hidden;
}
.expand-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.expand-section { margin-bottom: 16px; }
.expand-section:last-child { margin-bottom: 0; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text3); margin-bottom: 8px; }
.framing-text {
  font-size: 14px; color: var(--text2); line-height: 1.55;
  background: rgba(255,109,59,.06); border-radius: 7px; padding: 12px 14px;
  border-left: 2px solid var(--accent);
}
.framing-text.hate-style { background: rgba(239,68,68,.06); border-color: var(--red); }
.roadmap-steps { display: flex; flex-direction: column; gap: 8px; }
.roadmap-step { font-size: 14px; color: var(--text2); display: flex; gap: 8px; align-items: flex-start; }
.roadmap-step::before { content: '→'; color: var(--accent); font-weight: 700; flex-shrink: 0; }
.roadmap-result {
  margin-top: 10px; background: rgba(34,197,94,.08); border: 1px solid rgba(34,197,94,.2);
  border-radius: 7px; padding: 10px 13px; font-size: 14px; color: var(--green); font-weight: 600;
  display: flex; gap: 6px; align-items: center;
}
.roadmap-result::before { content: '✓'; }
.paths-heading { font-size: 15px; font-weight: 800; letter-spacing: -.2px; margin-bottom: 4px; }
.paths-sub     { font-size: 13px; color: var(--text3); margin-bottom: 14px; }
.path-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 10px; overflow: hidden; position: relative;
}
.path-card-header {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid var(--border);
}
.path-icon { font-size: 20px; flex-shrink: 0; }
.path-header-text { flex: 1; }
.path-num   { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--text3); margin-bottom: 2px; }
.path-title { font-size: 14px; font-weight: 700; }
.path-badge {
  font-size: 11px; font-weight: 700; padding: 2px 9px;
  border-radius: 20px; white-space: nowrap;
}
.badge-free   { background: rgba(34,197,94,.1);  color: var(--green); border: 1px solid rgba(34,197,94,.2); }
.badge-paid   { background: rgba(124,58,237,.1); color: #a78bfa;      border: 1px solid rgba(124,58,237,.2); }
.badge-custom { background: rgba(255,109,59,.1); color: var(--accent); border: 1px solid rgba(255,109,59,.2); }
.path-body { padding: 13px 16px; }
.path-desc { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 12px; }
.coming-soon {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 7px;
  padding: 9px 13px; font-size: 12px; color: var(--text3); text-align: center;
}
.coming-soon a { color: var(--accent); text-decoration: none; }
.coming-soon a:hover { text-decoration: underline; }
.btn-dfy {
  display: block; text-align: center; background: var(--accent); color: #fff;
  padding: 11px 20px; border-radius: 8px; font-weight: 700; font-size: 14px;
  font-family: inherit; text-decoration: none; border: none; cursor: pointer; width: 100%;
  transition: background .15s, transform .15s, box-shadow .15s;
}
.btn-dfy:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,109,59,.3); }

/* SHARE CTA */
.share-block {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
  padding: 18px 20px; margin: 20px 0 16px; text-align: center;
}
.share-block p { font-size: 14px; color: var(--text2); margin-bottom: 14px; font-style: italic; }
.share-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.share-btn {
  padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--text2); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit; transition: all .15s;
  text-decoration: none; display: inline-block;
}
.share-btn:hover { border-color: var(--accent); color: var(--accent); }

/* EMAIL FORM */
.email-section {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; position: relative; overflow: hidden;
}
.email-section::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.email-section h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.email-section .email-sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.form-field { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; display: block; }
.form-input, .form-textarea, .form-select {
  width: 100%; padding: 11px 14px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 7px; color: var(--text);
  font-size: 14px; font-family: inherit; outline: none; transition: border-color .15s;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { appearance: none; cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.optional-label { font-size: 11px; color: var(--text3); margin-left: 4px; font-weight: 400; text-transform: none; letter-spacing: 0; }
.skip-link { display: block; text-align: center; font-size: 13px; color: var(--text3); margin-top: 12px; cursor: pointer; text-decoration: underline; }
.skip-link:hover { color: var(--text2); }

/* SUCCESS STATE */
.submit-success {
  text-align: center; padding: 10px 0;
}
.submit-success .success-icon { font-size: 40px; margin-bottom: 12px; }
.submit-success h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.submit-success p { font-size: 14px; color: var(--text2); line-height: 1.6; }
.submit-error { font-size: 13px; color: var(--red); margin-top: 8px; }

/* BOOK A CALL */
.book-call {
  margin-top: 20px; text-align: center; padding: 20px;
  border: 1px solid var(--border); border-radius: 10px; background: var(--bg2);
}
.book-call p { font-size: 14px; color: var(--text2); margin-bottom: 14px; }
.book-call a {
  display: inline-block; padding: 11px 24px; border: 1px solid var(--accent);
  border-radius: 8px; color: var(--accent); font-size: 14px; font-weight: 700;
  text-decoration: none; transition: background .15s;
}
.book-call a:hover { background: rgba(255,109,59,.1); }

/* MOBILE — 768px breakpoint */
@media (max-width: 768px) {
  .screen { padding: 28px 16px 60px; }

  h1 { font-size: 24px; }
  .subtitle { font-size: 14px; }

  .stat-row { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .stat-num { font-size: 22px; }
  .stat-lbl { font-size: 11px; }

  .cat-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .cat-card { padding: 14px 12px; }
  .cat-emoji { font-size: 22px; }

  .results-table { display: block; overflow-x: auto; }

  .form-row { grid-template-columns: 1fr; }

  .share-btns { flex-direction: column; align-items: stretch; }
  .share-btn { text-align: center; }
}

@media (max-width: 480px) {
  h1 { font-size: 21px; letter-spacing: -.3px; }
  .btn { font-size: 14px; padding: 11px 20px; }
  .stat-row { gap: 4px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Life Builder OS</span>
  <span class="topbar-sep">·</span>
  <span class="topbar-product">AI Pain Audit</span>
</div>

<!-- Screen containers — JS shows/hides these -->
<main id="quiz-root">
  <div id="screen-1" class="screen active"></div>
  <div id="screen-2" class="screen"></div>
  <div id="screen-3" class="screen"></div>
  <div id="screen-4" class="screen"></div>
  <div id="screen-5" class="screen"></div>
</main>

<script>
// === QUIZ STATE ===
const quizState = {

  pains: [],            // array of pain IDs, max 5
  customPain: null,     // string from "+ add own" or null
  tags: {},             // { painId: 'routine' | 'hate' }
  buyClicks: [],        // [{ pain: string, price: number }]
  utmParams: {}         // { utm_source, utm_medium, utm_campaign }
};

// Capture UTM params on load
(function captureUTM() {
  const params = new URLSearchParams(window.location.search);
  ['utm_source','utm_medium','utm_campaign'].forEach(k => {
    if (params.get(k)) quizState.utmParams[k] = params.get(k);
  });
})();

function togglePain(id) {
  const idx = quizState.pains.indexOf(id);
  if (idx > -1) {
    quizState.pains.splice(idx, 1);
    delete quizState.tags[id];
    gtag('event', 'pain_selected', { pain: id, action: 'deselected' });
  } else {
    if (quizState.pains.length >= 5) return;
    quizState.pains.push(id);
    gtag('event', 'pain_selected', { pain: id, action: 'selected' });
  }
  renderScreen3();
}

  const el = document.getElementById('pain-count');

function confirmAddOwn(val) {
  if (!val.trim()) return;
  quizState.customPain = val.trim();

    quizState.pains.push('custom');

        <p style="font-size:12px;color:var(--text3);text-align:center;margin-top:8px">We'll send your roadmap within 24 hours. No spam.</p>
      </div>
    </div>

    <div class="book-call">
      <p><strong>Want to talk through your specific situation?</strong></p>
      <a href="https://calendly.com/artem-scait/30min" target="_blank" onclick="gtag('event','book_call_clicked')">
        Book a free 20-min call with Artem →
      </a>
    </div>
  `;

  // Set share hrefs via JS to avoid innerHTML encoding issues
  const currentUrl = window.location.href;
  const shareMsg = `Just found out I'm wasting ${saved} hours/week on work AI can handle. Free audit → ${currentUrl}`;
  document.getElementById('share-li').href =
    'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(currentUrl);
  document.getElementById('share-th').href =
    'https://www.threads.net/intent/post?text=' + encodeURIComponent(shareMsg);
  document.getElementById('share-copy').addEventListener('click', function() {
    navigator.clipboard.writeText(currentUrl).then(() => {
      this.innerHTML = '✅ Copied!';
      setTimeout(() => { this.innerHTML = '📋 Copy link'; }, 2000);
    }).catch(() => {
      this.innerHTML = '✅ Copied!';
      setTimeout(() => { this.innerHTML = '📋 Copy link'; }, 2000);
    });
  });
}

// === FORM SUBMISSION ===
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzfBe87y7FsxcCEm_4OU_RG0u7SsVKhKtsmWb1wthedrL5dW86637Duyb-6-WlMopkflw/exec';

function submitForm() {
  const name    = document.getElementById('f-name').value.trim();
  const email   = document.getElementById('f-email').value.trim();
  const title   = document.getElementById('f-jobtitle').value.trim();
  const pointA  = document.getElementById('f-pointa').value.trim();
  const pointB  = document.getElementById('f-pointb').value.trim();
  const timeline = document.getElementById('f-timeline').value;
  const linkedin = document.getElementById('f-linkedin').value.trim();
  const errorEl = document.getElementById('form-error');

  if (!name || !email || !title || !pointA || !pointB || !timeline) {
    errorEl.textContent = 'Please fill in all required fields.';
    errorEl.style.display = 'block';
    return;
  }
  if (!email.includes('@')) {
    errorEl.textContent = 'Please enter a valid email address.';
    errorEl.style.display = 'block';
    return;
  }
  errorEl.style.display = 'none';

  const payload = {
    timestamp: new Date().toISOString(),
    ...quizState.utmParams,
    category: quizState.category,
    profession: quizState.profession || '',
    pains: JSON.stringify(quizState.pains),
    tags: JSON.stringify(quizState.tags),
    custom_pain: quizState.customPain || '',
    buy_clicks: JSON.stringify(quizState.buyClicks),
    hours_wasted: quizState.pains.reduce((s, id) => {
      const p = (PAIN_DATA[quizState.category] || []).find(x => x.id === id);
      return s + (p ? p.hoursWasted : 0);
    }, 0).toFixed(1),
    hours_with_ai: quizState.pains.reduce((s, id) => {
      const p = (PAIN_DATA[quizState.category] || []).find(x => x.id === id);
      return s + (p ? p.hoursWithAI : 0);
    }, 0).toFixed(1),
    first_name: name,
    email: email,
    job_title: title,
    point_a: pointA,
    point_b: pointB,
    timeline: timeline,
    linkedin_url: linkedin
  };

  const submitBtn = document.querySelector('#email-form-wrap .btn');
  submitBtn.textContent = 'Sending...';
  submitBtn.disabled = true;

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload)
  })
  .then(() => showSubmitSuccess(name))
  .catch(() => {
    errorEl.textContent = 'Something went wrong — email us directly at eco.stepanenko@gmail.com';
    errorEl.style.display = 'block';
    submitBtn.textContent = 'Send my AI roadmap →';
    submitBtn.disabled = false;
  });

  gtag('event', 'email_submitted');
}

function showSubmitSuccess(name) {
  const firstPainId = quizState.pains[0];
  const firstPain = (PAIN_DATA[quizState.category] || []).find(p => p.id === firstPainId);
  const firstTool = firstPain ? firstPain.diy.split(' — ')[0] : 'ChatGPT';

  document.getElementById('email-form-wrap').innerHTML = `
    <div class="submit-success">
      <div class="success-icon">✅</div>
      <h2>You're in, ${name}!</h2>
      <p>Check your inbox within 24 hours.<br><br>
      <strong>While you wait — your first action:</strong><br>
      ${firstTool} takes about 15 minutes to set up for your top pain.</p>
    </div>
  `;
}

function skipForm() {
  document.getElementById('email-section').style.display = 'none';
}


// Init
renderScreen1();
</script>
</body>
</html>
