<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Аудит Профілю - Life Builder OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
  --border: #2a2a2a; --accent: #ff6d3b; --accent-hover: #ff7d4f;
  --text: #ffffff; --text2: #a0a0a0; --text3: #888888;
  --green: #22c55e; --red: #ef4444; --blue: #3b82f6;
}
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; hyphens: none; -webkit-hyphens: none; word-break: normal; overflow-wrap: break-word; }

.topbar { background: rgba(13,13,13,.95); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
.topbar-brand { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: .06em; text-transform: uppercase; }
.topbar-sep { color: var(--border); font-size: 13px; }
.topbar-product { font-size: 13px; color: var(--text3); }

.screen { display: none; max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
.screen.active { display: block; }

.brand-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.brand-label::before { content: ''; width: 18px; height: 2px; background: var(--accent); border-radius: 2px; }
h1 { font-size: 28px; font-weight: 900; line-height: 1.15; letter-spacing: -.5px; margin-bottom: 12px; }
h1 .hl { background: linear-gradient(90deg, var(--accent), #ff9a6c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.subtitle { font-size: 15px; color: var(--text2); line-height: 1.65; margin-bottom: 24px; }
.welcome-title { font-size: 32px; font-weight: 900; line-height: 1.15; letter-spacing: -.6px; margin-bottom: 16px; }
.welcome-sub { font-size: 17px; color: var(--text2); line-height: 1.65; margin-bottom: 28px; }
.q-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px; }
.q-title { font-size: 20px; font-weight: 800; line-height: 1.2; letter-spacing: -.3px; margin-bottom: 8px; }
.q-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }

.back-nav { font-size: 13px; color: var(--text3); cursor: pointer; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 18px; padding: 6px 0; -webkit-tap-highlight-color: transparent; }
.back-nav:hover, .back-nav:active { color: var(--accent); }

.progress-wrap { margin-bottom: 28px; }
.progress-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
.progress-label { font-size: 13px; color: var(--text3); }
.progress-count { font-size: 13px; font-weight: 700; color: var(--accent); }
.progress-track { height: 4px; background: var(--bg3); border-radius: 4px; }
.progress-fill { height: 4px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 8px rgba(255,109,59,.5); transition: width .3s ease; }

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--accent); color: #fff; padding: 14px 24px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s, transform .15s, box-shadow .15s; width: 100%; font-family: inherit; min-height: 52px; -webkit-tap-highlight-color: transparent; }
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(255,109,59,.3); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.cat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 16px; cursor: pointer; transition: border-color .15s, background .15s; position: relative; overflow: hidden; min-height: 110px; -webkit-tap-highlight-color: transparent; }
.cat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); transition: background .15s; }
.cat-card.selected { border-color: var(--accent); background: rgba(255,109,59,.06); }
.cat-card.selected::before { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.cat-card:hover:not(.selected) { border-color: #444; }
.cat-emoji { font-size: 26px; margin-bottom: 10px; display: block; }
.cat-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.cat-sub { font-size: 12px; color: var(--text2); line-height: 1.4; }

.role-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.role-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: border-color .15s, background .15s; font-size: 14px; font-weight: 600; min-height: 54px; display: flex; align-items: center; -webkit-tap-highlight-color: transparent; }
.role-item:hover { border-color: #444; }
.role-item.selected { border-color: var(--accent); background: rgba(255,109,59,.06); color: var(--accent); }

.opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.opt-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px 14px; cursor: pointer; transition: border-color .15s, background .15s; text-align: center; min-height: 92px; -webkit-tap-highlight-color: transparent; }
.opt-card:hover { border-color: #444; }
.opt-card.selected { border-color: var(--accent); background: rgba(255,109,59,.06); }
.opt-icon { font-size: 22px; margin-bottom: 8px; display: block; }
.opt-label { font-size: 13px; font-weight: 700; }
.opt-sub { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.35; }

.opt-grid-5 > .opt-card:last-child { grid-column: 1 / -1; display: flex; flex-direction: row; align-items: center; gap: 14px; text-align: left; min-height: 58px; padding: 14px 18px; }
.opt-grid-5 > .opt-card:last-child .opt-icon { font-size: 22px; margin-bottom: 0; flex-shrink: 0; }

.pain-question { font-size: 19px; font-weight: 800; line-height: 1.3; letter-spacing: -.3px; margin-bottom: 28px; }
.pain-opts { display: flex; flex-direction: column; gap: 12px; }
.pain-opt { border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px; cursor: pointer; transition: border-color .15s, background .15s; display: flex; align-items: center; gap: 14px; min-height: 72px; -webkit-tap-highlight-color: transparent; }
.pain-opt:hover { border-color: #444; }
.pain-opt.selected-hate { border-color: var(--red); background: rgba(239,68,68,.07); }
.pain-opt.selected-routine { border-color: var(--blue); background: rgba(59,130,246,.07); }
.pain-opt.selected-ok { border-color: var(--green); background: rgba(34,197,94,.07); }
.pain-opt-icon { font-size: 26px; flex-shrink: 0; }
.pain-opt-text { flex: 1; }
.pain-opt-label { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.pain-opt-desc { font-size: 13px; color: var(--text2); line-height: 1.4; }

.tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.tool-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 14px; cursor: pointer; transition: border-color .15s, background .15s; display: flex; align-items: center; gap: 10px; min-height: 56px; -webkit-tap-highlight-color: transparent; }
.tool-card:hover { border-color: #444; }
.tool-card.selected { border-color: var(--accent); background: rgba(255,109,59,.06); }
.tool-check { width: 18px; height: 18px; min-width: 18px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; flex-shrink: 0; }
.tool-card.selected .tool-check { background: var(--accent); border-color: var(--accent); }
.tool-card.selected .tool-check::after { content: '✓'; color: #fff; font-weight: 800; }
.tool-name { font-size: 13px; font-weight: 700; }

/* RESULTS */
.score-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
.score-block::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.score-label { font-size: 12px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.score-num { font-size: 48px; font-weight: 900; color: var(--accent); letter-spacing: -2px; line-height: 1; margin-bottom: 4px; }
.score-unit { font-size: 18px; font-weight: 700; color: var(--text2); }
.score-sub { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.score-bar { height: 6px; background: var(--bg3); border-radius: 6px; margin-bottom: 12px; }
.score-bar-fill { height: 6px; border-radius: 6px; background: linear-gradient(90deg, var(--accent), #ff9a6c); box-shadow: 0 0 10px rgba(255,109,59,.4); transition: width .6s ease; }
.savings-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.15); border-radius: 8px; }
.savings-label { font-size: 13px; color: var(--text2); }
.savings-value { font-size: 16px; font-weight: 800; color: var(--green); }

.auto-cards { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.auto-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px; position: relative; overflow: hidden; }
.auto-card::before { content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px; background: var(--accent); }
.auto-num { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.auto-title { font-size: 16px; font-weight: 800; margin-bottom: 12px; }
.auto-state { display: flex; flex-direction: column; gap: 8px; }
.auto-state-row { border-radius: 8px; padding: 11px 13px; }
.auto-state-row.is-before { background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.12); }
.auto-state-row.is-after  { background: rgba(34,197,94,.06);  border: 1px solid rgba(34,197,94,.12); }
.auto-state-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; display: block; }
.auto-state-label.is-before { color: #fca5a5; }
.auto-state-label.is-after  { color: #86efac; }
.auto-state-text { font-size: 13px; color: var(--text2); line-height: 1.55; }

.email-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; position: relative; overflow: hidden; }
.email-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
.email-section h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.email-sub { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.form-field { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; display: block; }
.form-input { width: 100%; padding: 13px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; min-height: 50px; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text3); }
.submit-error { font-size: 13px; color: var(--red); margin-top: 8px; }
.submit-success { text-align: center; padding: 10px 0; }
.submit-success .success-icon { font-size: 40px; margin-bottom: 12px; }
.submit-success h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.submit-success p { font-size: 14px; color: var(--text2); line-height: 1.6; }
.skip-link { display: block; text-align: center; font-size: 13px; color: var(--text3); margin-top: 12px; cursor: pointer; text-decoration: underline; }

.escape-link { display: block; text-align: center; font-size: 13px; color: var(--text3); margin-top: 16px; cursor: pointer; }
.escape-link:hover { color: var(--accent); }

.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 22px 0; }
.stat-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 12px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 5px; letter-spacing: -1px; }
.stat-lbl { font-size: 11px; color: var(--text3); line-height: 1.4; }

.gate-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px 24px; position: relative; overflow: hidden; }
.gate-section::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #ff9a6c); }
.gate-emoji { font-size: 40px; margin-bottom: 14px; display: block; text-align: center; }
.gate-title { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 6px; letter-spacing: -.3px; }
.gate-sub { font-size: 14px; color: var(--text2); text-align: center; margin-bottom: 24px; line-height: 1.55; }
.barrier-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.barrier-opt { border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text2); transition: border-color .15s, background .15s, color .15s; -webkit-tap-highlight-color: transparent; }
.barrier-opt:hover { border-color: #444; }
.barrier-opt.selected { border-color: var(--accent); background: rgba(255,109,59,.06); color: var(--text); font-weight: 600; }
.barrier-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; display: block; }

.share-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 22px 20px; margin-bottom: 16px; position: relative; overflow: hidden; }
.share-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), #ff9a6c); }
.share-card-brand { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
.share-card-role { font-size: 17px; font-weight: 900; margin-bottom: 14px; letter-spacing: -.2px; }
.share-card-score { display: flex; gap: 10px; margin-bottom: 16px; }
.share-card-score-item { flex: 1; background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
.share-card-score-num { font-size: 22px; font-weight: 900; color: var(--accent); line-height: 1; letter-spacing: -1px; }
.share-card-score-lbl { font-size: 11px; color: var(--text3); margin-top: 3px; }
.share-card-autos { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.share-card-auto { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text2); line-height: 1.4; }
.share-card-auto-num { font-size: 11px; font-weight: 800; color: var(--accent); background: rgba(255,109,59,.1); border-radius: 4px; padding: 2px 6px; flex-shrink: 0; margin-top: 1px; }
.share-card-footer { font-size: 12px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 12px; }

.share-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 20px; font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer; width: 100%; font-family: inherit; transition: border-color .15s, background .15s; margin-bottom: 16px; min-height: 50px; -webkit-tap-highlight-color: transparent; }
.share-btn:hover { border-color: var(--accent); color: var(--accent); }
.share-copied { color: var(--green); border-color: var(--green); }

.social-links { display: flex; flex-direction: column; gap: 10px; }
.social-link { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 16px; text-decoration: none; color: var(--text); font-size: 14px; font-weight: 600; transition: border-color .15s; min-height: 50px; }
.social-link:hover { border-color: #444; }
.social-link-icon { font-size: 20px; flex-shrink: 0; }
.social-link-meta { flex: 1; }
.social-link-name { font-size: 13px; font-weight: 700; }
.social-link-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

@media (max-width: 768px) {
  .pain-opt { padding: 18px 14px; }
  .pain-opt-label { font-size: 16px; }
}
@media (max-width: 480px) {
  .screen { padding: 28px 16px 60px; }
  h1 { font-size: 23px; }
  .welcome-title { font-size: 26px; }
  .welcome-sub { font-size: 15px; }
  .pain-question { font-size: 17px; }
  .opt-card { padding: 14px 10px; }
  .cat-card { padding: 16px 12px; }
  .score-num { font-size: 40px; }
  .auto-title { font-size: 15px; }
  .auto-state-text { font-size: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-brand">Life Builder OS</span>
  <span class="topbar-sep">·</span>
  <span class="topbar-product">AI Аудит Профілю</span>
</div>

<main id="quiz-root">
  <div id="screen-welcome" class="screen active"></div>
  <div id="screen-q1" class="screen"></div>
  <div id="screen-q2" class="screen"></div>
  <div id="screen-q3" class="screen"></div>
  <div id="screen-q4" class="screen"></div>
  <div id="screen-q5" class="screen"></div>
  <div id="screen-pain" class="screen"></div>
  <div id="screen-q13" class="screen"></div>
  <div id="screen-gate" class="screen"></div>
  <div id="screen-results" class="screen"></div>
  <div id="screen-escape" class="screen"></div>
</main>

<script>
// =====================================================================
// DATA - 5 categories, 23 roles
// Each pain: { text, hrs }
// Each automation: { title, before, after, pains[] }
// =====================================================================
const QUIZ_DATA = [
  // ─────────────────────────────────────────────────────
  // CATEGORY 1: SALES & MARKETING
  // ─────────────────────────────────────────────────────
  {
    id: 'sales', emoji: '📣', label: 'Продажі та маркетинг',
    sub: 'Менеджери, маркетологи, контент',
    roles: [
      {
        id: 'sales-mgr', label: 'Менеджер з продажів / SDR',
        pains: [
          { text: 'Збираю ліди вручну з різних джерел - сайти, Instagram, довідники', hrs: 3 },
          { text: 'Вношу контакти в CRM або таблицю після кожного дзвінка', hrs: 1.5 },
          { text: 'Пишу однотипні листи або повідомлення для кожного клієнта', hrs: 2 },
          { text: 'Нагадую собі про follow-up в нотатках - часто гублю', hrs: 0.5 },
          { text: 'Шукаю інформацію про клієнта перед кожним дзвінком вручну', hrs: 1.5 },
          { text: 'Роблю звіт по продажах наприкінці тижня або місяця вручну', hrs: 1.5 },
          { text: 'Не розумію яким лідам дати пріоритет - визначаю інтуїтивно', hrs: 0.5 },
        ],
        automations: [
          { title: 'Парсер лідів', pains: [0,1],
            before: 'Щодня по 2-3 години шукаєш контакти вручну по сайтах, Instagram, довідниках. Копіюєш у Excel - половина інформації застаріла або неточна.',
            after: 'Скрипт автоматично збирає нові ліди щодня → структурована база в Sheets → Telegram нотифікація тобі. Ти витрачаєш 5 хвилин на перегляд замість 3 годин на збір.' },
          { title: 'AI-листи з персоналізацією', pains: [2,4],
            before: 'Кожен лист пишеш вручну "під клієнта" - займає 15-20 хвилин. Більшість все одно схожі між собою, але процес забирає повну увагу.',
            after: 'Claude бере шаблон + дані клієнта з CRM → генерує персональний лист за 30 секунд. Верифікуєш результат, вносиш правки і відправляєш в роботу.' },
          { title: 'Follow-up бот', pains: [3,5,6],
            before: 'Нагадування в голові або нотатках - забуваєш, гублиш ліди. Звіт збираєш вручну щотижня з 10 різних місць.',
            after: 'Бот нагадує тобі в потрібний час + надсилає клієнту авто-повідомлення по таймеру. Звіт формується автоматично з CRM щотижня.' },
        ]
      },
      {
        id: 'digital-mkt', label: 'Digital маркетолог / Медіабаєр',
        pains: [
          { text: 'Переношу ліди з Facebook/Instagram Lead Ads у CRM або таблицю вручну', hrs: 2 },
          { text: 'Роблю зведений звіт по кампаніях вручну - збираю з кількох кабінетів', hrs: 3 },

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function progressBar(step) {
  const pct = Math.round(step / 13 * 100);
  return `<div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Крок ${step}/13</span>
      <span class="progress-count">${pct}%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
}

const HOURS_LABELS    = { lt2:'Менше 2 годин', '2to5':'2-5 годин', '5to10':'5-10 годин', gt10:'Більше 10 годин', unknown:'Не знаю' };
const STORAGE_LABELS  = { sheets:'Excel / Google Sheets', crm:'CRM система', notes:'Нотатки / блокнот', head:'У голові' };
const PIPELINE_LABELS = { targeted:'Цільовий список', mass:'Масова розсилка', network:'Нетворкінг', chaos:'Хаотично' };
const TEAM_LABELS     = { solo:'Тільки я', small:'2-5 людей', mid:'6-20 людей', large:'Більше 20' };
const SEARCH_LABELS   = { lt1m:'До місяця', '1to3m':'1-3 місяці', gt3m:'Понад 3 місяці', planning:'Ще не починав' };
const SCORE_LABELS    = ['Не проблема', 'Рутина', 'Ненавиджу'];

function buildPayload(overrides = {}) {
  const cat  = QUIZ_DATA[state.categoryIdx];
  const role = cat.roles[state.roleIdx];
  const isJobSearch = cat.id === 'jobsearch';

  const total = role.pains.reduce((s,p,i) => s + ((state.pains[i]||0)>0 ? p.hrs : 0), 0);
  const topPains = role.pains.map((p,i)=>({hrs:p.hrs*(state.pains[i]||0),text:p.text}))
    .sort((a,b)=>b.hrs-a.hrs).slice(0,2).map(x=>x.text);

  const toolLabels = Object.fromEntries(AI_TOOLS.map(t=>[t.id,t.label]));

  const painFields = {};
  role.pains.forEach((p,i) => {
    painFields[`pain_${i+1}`]       = p.text;
    painFields[`pain_${i+1}_score`] = SCORE_LABELS[state.pains[i] ?? 0];
  });

  return {
    product:      'P-AI-Audit-UA',
    first_name:   state.gateName  || 'anon',
    email:        state.gateEmail || '',
    profession:   state.gateProf  || '',
    comment:      state.gateComment || '',
    category:     cat.label,
    role_id:      role.id,
    job_title:    role.label,
    main_task:    topPains[0] || '',
    pain2:        topPains[1] || '',
    score:        Math.round(total * 10) / 10,
    hours_self:   HOURS_LABELS[state.q3]    || state.q3 || '',
    data_storage: isJobSearch ? (PIPELINE_LABELS[state.q4] || state.q4 || '') : (STORAGE_LABELS[state.q4] || state.q4 || ''),
    team_size:    isJobSearch ? (SEARCH_LABELS[state.q5]   || state.q5 || '') : (TEAM_LABELS[state.q5]    || state.q5 || ''),
    ai_tools:     state.q13.map(id => toolLabels[id] || id).join(', '),
    ...painFields,
    ...state.utmParams,
    ...overrides,
  };
}

function sendToSheets(payload) {

      <div style="font-size:16px;font-weight:800;margin-bottom:6px;">Хочеш персональний план?</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.55;">Залиш email - надішлю персоналізований список: що вчити і з чого почати саме для тебе.</div>
      <div class="form-field">
        <label class="form-label">Email</label>
        <input class="form-input" id="results-email" type="email" placeholder="твій@email.com" inputmode="email" autocomplete="email" />
      </div>
      <button class="btn" onclick="submitResultsEmail()">Надіслати →</button>
      <div id="results-email-error" class="submit-error" style="display:none"></div>
    </div>` : ''}
  `;

  goTo('screen-results');

  // Animate score bar
  setTimeout(() => {
    const fill = document.querySelector('.score-bar-fill');
    if (fill) fill.style.width = pctOfWeek + '%';
  }, 100);
}


// =====================================================================
// SHARE
// =====================================================================
async function shareResult() {
  const role   = QUIZ_DATA[state.categoryIdx].roles[state.roleIdx];
  const total  = role.pains.reduce((s,p,i) => s + ((state.pains[i]||0)>0 ? p.hrs : 0), 0);
  const saved  = Math.round(total * 0.8 * 10) / 10;
  const sorted = [...role.automations].sort((a,b) =>
    Math.max(...b.pains.map(i=>state.pains[i]||0)) - Math.max(...a.pains.map(i=>state.pains[i]||0))
  );
  const top3 = sorted.slice(0, 3);

  const shareText = [
    `Пройшов AI-аудит — ${role.label}.`,
    ``,
    total > 0
      ? `${saved} год/тиж можна делегувати автоматизаціям і AI замість того щоб робити це вручну.`
      : `Знайшов потенціал для делегування рутинних задач автоматизаціям і AI.`,
    ``,
    `Топ-3 процеси:`,
    ...top3.map(a => `• ${a.title}`),
    ``,
    `Перевір себе → @artem.org.ua`,
  ].join('\n');

  const btn = document.getElementById('share-btn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Готую текст...';

  try {
    if (navigator.share) {
      await navigator.share({ text: shareText });
    } else {
      await navigator.clipboard.writeText(shareText);
      btn.classList.add('share-copied');
      btn.innerHTML = '✓ Скопійовано — вставляй в Threads';
      setTimeout(() => {
        btn.classList.remove('share-copied');
        btn.innerHTML = '↑ Поділитись в Threads';
        btn.disabled = false;
      }, 3000);
      return;
    }
  } catch(e) {
    await navigator.clipboard.writeText(shareText).catch(()=>{});
    btn.classList.add('share-copied');
    btn.innerHTML = '✓ Скопійовано в буфер';
    setTimeout(() => {
      btn.classList.remove('share-copied');
      btn.innerHTML = '↑ Поділитись в Threads';
      btn.disabled = false;
    }, 2500);
  }

  btn.innerHTML = '↑ Поділитись в Threads';
  btn.disabled = false;
}

function submitEscape() {
  const name  = document.getElementById('esc-name').value.trim();
  const role  = document.getElementById('esc-role').value.trim();
  const email = document.getElementById('esc-email').value.trim();
  const errEl = document.getElementById('esc-error');
  if (!name)  { errEl.textContent='Введи своє ім\'я'; errEl.style.display='block'; return; }
  if (!role)  { errEl.textContent='Розкажи чим займаєшся'; errEl.style.display='block'; return; }
  if (!email || !email.includes('@')) { errEl.textContent='Введи коректний email'; errEl.style.display='block'; return; }
  errEl.style.display='none';

  const FORM_URL = 'https://script.google.com/macros/s/AKfycbzfBe87y7FsxcCEm_4OU_RG0u7SsVKhKtsmWb1wthedrL5dW86637Duyb-6-WlMopkflw/exec';
  fetch(FORM_URL + '?' + new URLSearchParams({product:'P-AI-Audit-Escape', first_name:name, job_title:role, email, ...state.utmParams})).catch(()=>{});

  document.getElementById('screen-escape').innerHTML = `
    <div style="text-align:center;padding:60px 0">
      <div style="font-size:48px;margin-bottom:16px">📬</div>
      <h1 style="font-size:22px;margin-bottom:10px">Готово!</h1>
      <p style="color:var(--text2);font-size:14px;line-height:1.6">Надіслав на <strong>${email}</strong>.<br>Якщо не бачиш - перевір «Спам».</p>
      <button class="btn" style="margin-top:28px;max-width:220px" onclick="goToQ1()">← Пройти тест</button>
    </div>
  `;
}
