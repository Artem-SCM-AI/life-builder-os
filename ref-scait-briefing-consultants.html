<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCAIT Agency — Briefing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --bg: #0B0F1A;
      --bg-card: #141924;
      --bg-card-alt: #1A2230;
      --border: #1E2A3B;
      --text: #FFFFFF;
      --text-secondary: #94A3B8;
      --accent: #3B82F6;
      --accent-dim: #1D4ED8;
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    /* Language toggle logic */
    body.lang-en .ua { display: none; }
    body.lang-ua .en { display: none; }

    /* Layout */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    header .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* Hero */
    .hero {
      padding: 64px 0 48px;
      border-bottom: 1px solid var(--border);
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .hero-meta {
      color: var(--text-secondary);
      font-size: 15px;
    }

    /* Sections */
    section {
      padding: 56px 0;
      border-bottom: 1px solid var(--border);
    }

    section:last-of-type { border-bottom: none; }

    .section-number {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      line-height: 1.2;
    }

    h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    p {
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    p:last-child { margin-bottom: 0; }

    strong { color: var(--text); font-weight: 600; }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card:last-child { margin-bottom: 0; }

    /* Stat callouts */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Framework */
    .framework {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    .framework-step {
      flex: 1;
      min-width: 140px;
      text-align: center;
    }

    .framework-step .label {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .framework-step .desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .framework-arrow {
      font-size: 24px;
      color: var(--accent);
      font-weight: 700;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      margin: 24px 0;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead tr {
      background: var(--bg-card-alt);
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
      vertical-align: top;
    }

    td:first-child { color: var(--text); font-weight: 500; }

    tr:last-child td { border-bottom: none; }

    .proof {
      color: var(--success);
      font-weight: 600;
      font-size: 13px;
    }

    /* Offer cards */
    .offer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }

    @media (max-width: 600px) {
      .offer-grid { grid-template-columns: 1fr; }
      .framework { flex-direction: column; }
      .framework-arrow { transform: rotate(90deg); }
    }

    .offer-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .offer-card.featured {
      border-color: var(--accent);
    }

    .offer-price {
      font-size: 32px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 4px;
    }

    .offer-timeline {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 12px;
    }

    .offer-name {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    .offer-details {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* Personas */
    .persona-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .persona-quote {
      font-style: italic;
      color: var(--text-secondary);
      font-size: 15px;
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin-top: 12px;
    }

    /* Status list */
    .status-list {
      list-style: none;
      margin: 16px 0;
    }

    .status-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      color: var(--text-secondary);
      font-size: 15px;
      border-bottom: 1px solid var(--border);
    }

    .status-list li:last-child { border-bottom: none; }

    .status-list .icon { flex-shrink: 0; margin-top: 2px; }

    /* Tags */
    .tag {
      display: inline-block;
      background: var(--bg-card-alt);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 3px;
    }

    /* Footer */
    footer {
      padding: 40px 0;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body class="lang-en">

  <header>
    <div class="container">
      <div class="inner">
        <div class="logo">SC<span>AI</span>T</div>
        <div class="lang-toggle">
          <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
          <button class="lang-btn" onclick="setLang('ua')" id="btn-ua">UA</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- CONTENT INJECTED IN TASK 2 -->
  </main>

  <footer>
    <div class="container">
      <p>Artem Stepanenko · eco.stepanenko@gmail.com · June 2026</p>
    </div>
  </footer>

  <script>
    function setLang(lang) {
      document.body.className = 'lang-' + lang;
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-ua').classList.toggle('active', lang === 'ua');
    }
  </script>

</body>
</html>
